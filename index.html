<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dimon Crypto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div id="balance">0</div>
    </div>

    <div class="coin-container">
        <div id="coin"></div>
    </div>

    <div class="footer">
        <div class="energy-box">
            <span>⚡ <span id="energy-text">100</span></span>
            <div class="energy-bar-bg">
                <div id="energy-bar"></div>
            </div>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" onclick="showScreen('shop')">🛒 Shop</button>
            <button class="nav-btn" onclick="showScreen('ref')">👥 Friends</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
