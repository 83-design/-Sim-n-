<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dimon Crypto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div class="balance-container">
            <span id="balance">0</span>
        </div>
    </div>

    <div class="coin-section">
        <div id="coin">
            <div class="engraving">Dimon Crypto</div>
        </div>
    </div>

    <div class="controls">
        <div class="energy-row">
            <span>⚡ <span id="energy-text">100</span> / 100</span>
        </div>
        <div class="energy-bar-bg">
            <div id="energy-bar"></div>
        </div>
        
        <div class="button-group">
            <button class="main-btn" onclick="showTab('shop')">🛒 Магазин</button>
            <button class="main-btn" onclick="showTab('ref')">👥 Рефы</button>
        </div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <p>Этот раздел будет доступен в следующем обновлении!</p>
            <button onclick="closeTab()">Закрыть</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
